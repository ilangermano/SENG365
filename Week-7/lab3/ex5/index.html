<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Application</title>
</head>

<body>
<div id="root">
</div>
<!-- Import the React, React-Dom and Babel libraries from unpkg -->
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script> <!--Note: development versions of react-->
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
<script type="application/javascript" src="https://unpkg.com/babel-standalone@6.26.0/babel.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script type="text/babel">
    const rootElement = document.getElementById('root');

    function App() {
        const [users, setUsers] = React.useState([])
        const [username, setUsername] = React.useState("")
        const [editUsername, setEditUsername] = React.useState("")
        const [editingUser, setEditingUser] = React.useState(null)

        React.useEffect(() => {
            axios.get('http://localhost:3000/api/users')
                .then((response) => {
                    console.log(response.data)
                    setUsers(response.data)
                }, (error) => {
                    console.log(error)
                })
        }, [])

        const list_of_users = () => {
            return users.map((item) =>
                <li key={item.user_id}>
                    <p>
                        {item.username}
                        <button onClick={() => deleteUser(item)}>Delete</button>
                        <button onClick={() => setEditingUser(item)}>Edit</button>
                    </p>
                </li>)
        }

        const UserList = () => {
            return (
                <div>
                    <h1>Users</h1>
                    <ul>
                        {list_of_users()}
                    </ul>
                </div>
            )
        }

        const addUser= () => {
            event.preventDefault();
            if (username === "") {
                alert("Please enter a username")
            } else {
                axios.post('http://localhost:3000/api/users', { "username": username })
                    .then(() => location.reload())
            }
        }

        const editUser = (user) => {
            event.preventDefault();
            if (editUsername === "") {
                alert("Please enter a username")
            } else {
                axios.put('http://localhost:3000/api/users/' + editingUser.user_id, { "username": editUsername })
                    .then(() => location.reload())
            }
        }

        const updateEditUsernameState = (event) => {
            setEditUsername(event.target.value)
        }

        const updateUsernameState = (event) => {
            setUsername(event.target.value)
        }

        const deleteUser = (user) => {
            axios.delete('http://localhost:3000/api/users/' + user.user_id)
                .then((response) => {
                    setUsers(users.filter(u => u.user_id != user.user_id))
                })
        }

        return (
            <div>
                <UserList />
                <h2>Add a new user:</h2>
                <form onSubmit={addUser}>
                    <input type="text" value={username} onChange={updateUsernameState} />
                    <input type="submit" value="Submit" />
                </form>
                {editingUser && (
                    <div>
                        <h2>Edit user: {editingUser.username}</h2>
                        <form onSubmit={editUser}>
                            <input type="text" value={editUsername} onChange={updateEditUsernameState} />
                            <input type="submit" value="Submit" />
                        </form>
                    </div>
                )}
            </div>
        )
    }

    ReactDOM.render(<App />, rootElement)
</script>
</body>
</html>
